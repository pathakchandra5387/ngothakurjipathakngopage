    <header>

        <nav>
            <ul>
                <li><a href="index.html#home">Home</a></li>
                <li><a href="index.html#about">About</a></li>

            <p>Stay updated with news from across India and around the world</p>

            <button class="tab-btn active" onclick="filterNews('international')">International</button>

            <button class="tab-btn" onclick="filterNews('karnataka')">Karnataka</button>
        </div>

        <!-- News Feed -->
        <div id="newsFeed" class="news-feed">
            <div class="loading">Loading news...</div>
        </div>
